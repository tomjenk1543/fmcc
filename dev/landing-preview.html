<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMCC — Landing Page Preview</title>

<!-- Standalone design-preview file, NOT part of the real app. It exists purely so the
     landing screen's look (badge, wordmark, animated background) can be opened and viewed
     directly in a browser without touching any real save data, without going through
     "Clear All Data", and without the rest of the app's boot logic running at all.

     Markup/CSS below is copied straight out of FM_Command_Centre.html's #landing section,
     .landing-* rules, and the handful of :root tokens those rules depend on — NOT
     regenerated from scratch, so it stays a faithful preview rather than a reinterpretation.
     When the real app's landing screen changes, re-sync this file by hand (there's no build
     step wiring the two together automatically).

     The two buttons here are inert (no JS) — this file is for looking at the page, not
     using it. -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* Landing always shows the neutral black/red "no data loaded" theme regardless of any
       previously-loaded club — see FM_Command_Centre.html's own --club-primary/--club-secondary
       comment (resetToBlankSlate() re-applies these same two values explicitly) — so this
       preview just hardcodes them rather than needing a club-colour picker. */
    --club-primary: #d81f2a;
    --club-secondary: #1a1a1a;
    --bg: #050505;
    --panel-border: #262626;
    --text: #f2f2f2;
    --text-dim: #9a9a9a;
    --club-text: color-mix(in srgb, var(--club-primary) 75%, white 25%);
    --radius-sm: 8px;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: color-mix(in srgb, color-mix(in srgb, var(--club-primary) 50%, var(--club-secondary) 50%) 9%, var(--bg) 91%);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Space Grotesk', "Segoe UI", Roboto, Arial, sans-serif;
  }

  #landing {
    position: relative;
    overflow: hidden;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .landing-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    color: var(--club-primary);
  }

  .landing-content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
  }

  .landing-badge {
    width: 168px;
    height: auto;
    margin-bottom: 4px;
    filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.45));
  }

  .landing-logo {
    font-weight: 700;
    font-size: 40px;
    letter-spacing: 1px;
    text-transform: uppercase;
    filter: drop-shadow(3px 3px 0 rgba(0, 0, 0, 0.5));
  }

  .landing-logo span {
    color: var(--club-text);
  }

  .landing-message {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }

  .mini-btn {
    background: none;
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 4px 8px;
    margin: 0;
    border-radius: var(--radius-sm);
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }

  .dashboard-empty-import-btn {
    background: var(--club-primary);
    border-color: var(--club-primary);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: var(--radius-sm);
    margin-top: 6px;
  }

  .dashboard-empty-import-btn:hover {
    background: color-mix(in srgb, var(--club-primary) 85%, #fff 15%);
    border-color: color-mix(in srgb, var(--club-primary) 85%, #fff 15%);
    color: #fff;
  }

  .dashboard-empty-settings-link {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
  }

  .dashboard-empty-settings-link:hover {
    color: var(--club-text);
  }

  /* ---- Landing screen animated background (kept identical to the real app) ---- */
  .landing-bg-line {
    position: absolute;
    opacity: 0.1;
  }

  .landing-bg-line-1 {
    width: 46vw;
    min-width: 320px;
    top: -12%;
    left: -10%;
    animation: landingDriftA 30s ease-in-out infinite;
  }

  .landing-bg-line-2 {
    width: 52vw;
    min-width: 360px;
    bottom: -16%;
    right: -12%;
    animation: landingDriftB 38s ease-in-out infinite;
  }

  .landing-bg-dot {
    position: absolute;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.16;
    filter: blur(1px);
    animation: landingFloat 12s ease-in-out infinite;
  }

  .landing-bg-dot.dot-1 { width: 10px; height: 10px; top: 18%; left: 12%; animation-duration: 10s; }
  .landing-bg-dot.dot-2 { width: 6px;  height: 6px;  top: 30%; left: 78%; animation-duration: 13s; animation-delay: -3s; }
  .landing-bg-dot.dot-3 { width: 8px;  height: 8px;  top: 68%; left: 20%; animation-duration: 12s; animation-delay: -6s; }
  .landing-bg-dot.dot-4 { width: 5px;  height: 5px;  top: 75%; left: 82%; animation-duration: 15s; animation-delay: -1s; }
  .landing-bg-dot.dot-5 { width: 7px;  height: 7px;  top: 46%; left: 6%;  animation-duration: 14s; animation-delay: -8s; }
  .landing-bg-dot.dot-6 { width: 6px;  height: 6px;  top: 10%; left: 60%; animation-duration: 11s; animation-delay: -4s; }

  @keyframes landingDriftA {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(2.5vw, 2vh) rotate(6deg); }
  }
  @keyframes landingDriftB {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(-3vw, -2.5vh) rotate(-5deg); }
  }
  @keyframes landingFloat {
    0%, 100% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-22px) translateX(6px); }
  }

  @media (prefers-reduced-motion: reduce) {
    .landing-bg-line,
    .landing-bg-dot {
      animation: none;
    }
  }
</style>
</head>
